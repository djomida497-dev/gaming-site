<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.wrapper{
width:1100px;
max-width:100%;
}

.notice{
background:linear-gradient(90deg,#2b0000,#ff0000);
padding:14px;
text-align:center;
font-weight:bold;
border-radius:10px;
box-shadow:0 0 20px red;
margin-bottom:15px;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
background:rgba(20,20,25,0.9);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(255,0,0,0.15);
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
}

.logo{
width:80px;
height:80px;
border-radius:50%;
margin:auto;
background:linear-gradient(45deg,#ff0000,#ff7300);
box-shadow:0 0 20px red;
}

h2{
text-align:center;
margin:15px 0;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#111;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:8px;
font-weight:bold;
}

.claim{
background:linear-gradient(90deg,#ff0000,#ff5c5c);
color:white;
}

.gray{
background:#222;
color:white;
}

.download{
background:#ff3b3b;
}

.list{
margin-top:15px;
max-height:300px;
overflow:auto;
}

.item{
background:#111;
padding:10px;
border-radius:8px;
margin-top:5px;
border-left:3px solid red;
font-size:14px;
}

.empty{
opacity:0.6;
text-align:center;
margin-top:40px;
}

@media(max-width:900px){
.panel{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="notice">
NOTICE: BUY NOW 50% DISCOUNT LIFETIME ACCESS
</div>

<div class="panel">

<!-- LEFT -->
<div class="card">

<div class="logo"></div>

<h2>EX CHEATS DASHBOARD</h2>

<input id="uid" placeholder="Gaming UID">

<button class="claim" onclick="claim()">
CLAIM FREE TRIAL
</button>

<button class="gray">
WHATSAPP SUPPORT
</button>

<button class="gray">
DISCORD SERVER
</button>

<button class="download">
DOWNLOAD BYPASS
</button>

<button class="gray">
FREE BYPASS
</button>

</div>

<!-- RIGHT -->
<div class="card">

<h2>RECENT CLAIMS</h2>

<div id="list" class="list"></div>

<div id="empty" class="empty">No claims recorded yet.</div>

</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("claims") || "[]");

function render(){
let list = document.getElementById("list");
let empty = document.getElementById("empty");

list.innerHTML = "";

if(data.length === 0){
empty.style.display = "block";
}else{
empty.style.display = "none";
}

data.forEach(item=>{
let div = document.createElement("div");
div.className = "item";
div.innerText = item;
list.appendChild(div);
});
}

function claim(){
let uid = document.getElementById("uid").value;
if(!uid) return;

data.unshift(uid);
localStorage.setItem("claims", JSON.stringify(data));

document.getElementById("uid").value = "";
render();
}

render();
</script>

</body>
</html>
