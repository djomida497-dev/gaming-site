<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:1100px;
padding:20px;
}

.topbar{
background:linear-gradient(90deg,#2b0000,#ff0000);
padding:14px;
text-align:center;
font-weight:bold;
letter-spacing:1px;
border-radius:8px;
box-shadow:0 0 25px red;
margin-bottom:15px;
}

.panel{
display:flex;
gap:20px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
border:1px solid rgba(255,0,0,0.25);
padding:20px;
border-radius:15px;
box-shadow:0 0 60px rgba(255,0,0,0.15);
}

.left,.right{
flex:1;
background:rgba(10,10,10,0.7);
border:1px solid rgba(255,0,0,0.2);
border-radius:12px;
padding:20px;
box-shadow:inset 0 0 20px rgba(255,0,0,0.05);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:linear-gradient(45deg,#ff0000,#ff6600);
box-shadow:0 0 25px red;
}

.title{
text-align:center;
margin:15px 0;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

input{
width:100%;
padding:12px;
background:#0f0f0f;
border:1px solid #333;
color:white;
border-radius:8px;
margin-bottom:10px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:8px;
cursor:pointer;
font-weight:bold;
letter-spacing:1px;
transition:0.2s;
}

.btn-red{
background:linear-gradient(90deg,#ff0000,#ff4d4d);
color:white;
box-shadow:0 0 15px rgba(255,0,0,0.3);
}

.btn-red:hover{
transform:scale(1.02);
box-shadow:0 0 25px red;
}

.btn-dark{
background:#1a1a1a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.section-title{
color:#ff4d4d;
margin-bottom:10px;
font-weight:bold;
letter-spacing:1px;
}

.claim{
background:#111;
padding:10px;
margin-top:8px;
border-left:3px solid red;
border-radius:6px;
font-size:14px;
}

.empty{
opacity:0.5;
text-align:center;
margin-top:50px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
NOTICE : BUY NOW - 50% DISCOUNT LIFETIME ACCESS
</div>

<div class="panel">

<!-- LEFT -->
<div class="left">

<div class="logo"></div>

<div class="title">EXTERNAL PANEL</div>

<input id="uid" placeholder="Gaming UID">

<button class="btn-red" onclick="claim()">
CLAIM FREE TRIAL
</button>

<button class="btn-dark">
WHATSAPP SUPPORT
</button>

<button class="btn-dark">
DISCORD SERVER
</button>

<button class="btn-red">
DOWNLOAD BYPASS
</button>

<button class="btn-dark">
FREE BYPASS
</button>

</div>

<!-- RIGHT -->
<div class="right">

<div class="section-title">RECENT CLAIMS</div>

<div id="list"></div>
<div id="empty" class="empty">No claims recorded yet.</div>

</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("claims") || "[]");

function render(){
let list = document.getElementById("list");
let empty = document.getElementById("empty");

list.innerHTML = "";

if(data.length === 0){
empty.style.display = "block";
}else{
empty.style.display = "none";
}

data.forEach(x=>{
let div = document.createElement("div");
div.className="claim";
div.innerText = x;
list.appendChild(div);
});
}

function claim(){
let uid = document.getElementById("uid").value;
if(!uid) return;

data.unshift(uid);
localStorage.setItem("claims", JSON.stringify(data));

document.getElementById("uid").value="";
render();
}

render();
</script>

</body>
</html>
